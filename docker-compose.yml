version: '3.8'

services:
 
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - GEMINI_API_KEY=your_actual_gemini_api_key_here
    volumes:
      - /usr/src/app/node_modules

 
  client:
    build:
      context: ./client
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - server
    volumes:
      - /usr/src/app/node_modules